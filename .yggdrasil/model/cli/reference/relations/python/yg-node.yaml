name: Relations Reference — Python
type: reference-catalogue
description: "Python name-resolution case catalogue — one .md per identification case
  (a syntactic form by which a cross-node Python dependency is detected and resolved
  through the module-path resolver, or deliberately silenced), 1:1 with a
  runCase('<id>') test in the Python matrix suite. The two relations aspects enforce
  that correspondence."
aspects:
  - reference/relations/case-has-test
  - reference/relations/case-is-tested
relations:
  - target: cli/tests/unit/relations/extractors-matrix-python
    type: uses
mapping:
  - reference/relations/python/*.md
