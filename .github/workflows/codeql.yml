name: CodeQL

# Advanced (committed) code scanning. This supersedes GitHub's default CodeQL setup —
# the two conflict, so default setup must be turned OFF in the repository's code-scanning
# settings once this workflow is in place. Keeping the config in the repo makes the scan
# reproducible and lets us scope which paths the security queries cover (see codeql-config.yml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan so newly-published query updates surface even without a push.
    - cron: '0 6 * * 1'

# Least-privilege default; the analyze job elevates only what CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required to upload the analysis results to the code-scanning dashboard.
      security-events: write
      # Required by CodeQL to read the workflow run for the `actions` language.
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Both languages that produce alerts for this repo: the TypeScript/JS source and
        # the GitHub Actions workflows themselves.
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
