name: Core Parsing
type: engine
description: In-memory parsers that transform pre-parsed data structures (not raw files). Includes the log.md entry parser, the file-level when-predicate parser, and the aspect-level when-predicate parser. No file I/O — callers read files and pass strings/objects.
aspects:
  - diagnostic-logging
relations:
  - target: cli/model/graph
    type: uses
  - target: cli/model/file-when
    type: uses
mapping:
  - source/cli/src/core/parsing/log-parser.ts
  - source/cli/src/core/parsing/file-when-parser.ts
  - source/cli/src/core/parsing/when-parser.ts
