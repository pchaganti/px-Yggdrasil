name: Relations Reference — Ruby
type: reference-catalogue
description: "Ruby name-resolution case catalogue — one .md per identification case
  (a syntactic form by which a cross-node Ruby dependency is detected and resolved
  through the dual-axis resolver — the require_relative path link plus the shared
  SymbolTable — or deliberately silenced), 1:1 with a runCase('<id>') test in the
  Ruby matrix suite. The two relations aspects enforce that correspondence."
aspects:
  - reference/relations/case-has-test
  - reference/relations/case-is-tested
relations:
  - target: cli/tests/unit/relations/extractors-matrix-ruby
    type: uses
mapping:
  - reference/relations/ruby/*.md
