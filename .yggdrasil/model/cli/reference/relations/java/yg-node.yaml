name: Relations Reference — Java
type: reference-catalogue
description: "Java name-resolution case catalogue — one .md per identification case
  (a syntactic form by which a cross-node Java dependency is detected and resolved,
  or deliberately silenced), 1:1 with a runCase('<id>') test in the Java matrix
  suite. The two relations aspects enforce that correspondence."
aspects:
  - reference/relations/case-has-test
  - reference/relations/case-is-tested
relations:
  - target: cli/tests/unit/relations/extractors-matrix-java
    type: uses
mapping:
  - reference/relations/java/*.md
