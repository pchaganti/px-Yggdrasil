name: PosixPathsOutput
description: "All paths written to stdout, stderr, or stored in graph outputs use forward-slash separators and no trailing slashes — consumer tools must never receive Windows-native paths."
reviewer:
  type: llm
scope:
  per: file
references:
  - path: source/cli/src/utils/posix.ts
    description: "Canonical path-output helpers. toPosixPath(p) converts backslashes to forward slashes AND strips trailing slashes — code that writes a path through toPosixPath() therefore satisfies both rules of this aspect. toPosix(p) only converts separators and preserves a trailing slash, so it is NOT sufficient for output paths on its own."
