# yg-architecture.yaml — live architecture vocabulary for this repository.
#
# Defines node types: their when-predicate (which source files belong to this type),
# enforce: strict (forward + backward classification), default aspects, allowed
# parent types, allowed relation targets, and log_required overrides.

node_types:

  # ── Organizational types (no when — parent-only, no source file classification) ──

  project:
    description: "Top-level grouping — root of the hierarchy. One per repository."
    parents: []
    relations:
      default: deny

  module:
    description: "Domain grouping — organizes children under shared domain responsibility."
    parents: [project, module]

  # ── Classifying types (have when; most enforce: strict) ──

  entry-point:
    description: "Executable entry point — the bin.ts dispatcher. Singleton; wraps all CLI commands and top-level error handling."
    enforce: strict
    when:
      path: "source/cli/src/bin.ts"
    aspects:
      - top-level-error-handler
      - command-exit-codes
      - posix-paths-source
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [command]
      uses: [command]
      default: deny

  command:
    description: "CLI command handler — registers a Commander subcommand and formats output. Every file must export register<X>Command."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/cli/*.ts"
        - not:
            path: "**/*.test.ts"
        - content: "export\\s+function\\s+register[A-Z]\\w*Command\\("
    aspects:
      - cli-command-contract
      - diagnostic-logging
      - command-contract-shape
      - posix-paths-source
      - no-direct-minimatch
      - command-error-via-buildissuemessage
      - sibling-test-file
    log_required: true
    parents: [module]
    relations:
      calls: [engine, parser-adapter, persistence-adapter, llm-shared, llm-subprocess-base, formatter, utility, ast-adapter, structure-adapter, template, command, command-support, knowledge-doc, schema-doc, migration, portal-pipeline, portal-engine-api, portal-server]
      uses: [types, test-suite, portal-contract]
      default: deny

  command-support:
    description: "Shared command-layer support — helpers used by command handlers but registering no Commander subcommand (e.g. graph-load-or-abort, the unexpected-error funnel). Lives in cli/ so it may legally import both the engine (loadGraph) and formatters (buildIssueMessage) that command handlers need, without each handler duplicating the logic. Distinguished from `command` by the absence of a register<X>Command export."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/cli/*.ts"
        - not:
            path: "**/*.test.ts"
        - not:
            content: "export\\s+function\\s+register[A-Z]\\w*Command\\("
    aspects:
      - posix-paths-source
      - no-direct-minimatch
      - command-error-via-buildissuemessage
    parents: [module]
    relations:
      calls: [engine, parser-adapter, persistence-adapter, formatter, utility]
      uses: [types]
      default: deny

  engine:
    description: "Core domain logic — algorithms, validation, assembly, drift detection. No I/O, no console output, no LLM calls."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/core/**/*.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - deterministic
      - no-direct-fs
      - no-direct-console
      - no-nondeterminism-direct
      - posix-paths-source
      - no-direct-minimatch
      - single-source-graph-queries
    log_required: true
    parents: [module]
    relations:
      calls: [engine, parser-adapter, persistence-adapter, llm-shared, utility, formatter, relations-adapter, structure-adapter]
      uses: [types]
      default: deny

  migration:
    description: "Schema migration — upgrades a .yggdrasil graph from one version to the next. Named to-X.Y.Z.ts."
    enforce: strict
    when:
      path: "source/cli/src/migrations/*.ts"
    aspects:
      - migration-idempotent
      - migration-bumps-version
      - schema-bump-bookkeeping
      - posix-paths-source
      - no-direct-minimatch
    log_required: true
    parents: [module]
    relations:
      calls: [engine, parser-adapter, persistence-adapter, utility]
      uses: [types]
      default: deny

  parser-adapter:
    description: "File-reading parser adapters: read a file from disk and return a typed model object. In-memory parsers live in engine."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/io/*-parser.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - parser-contract
      - silent-missing-files
      - posix-paths-source
      - no-direct-minimatch
      - read-or-default-via-helper
      - parser-yaml-guard
    log_required: true
    parents: [module]
    relations:
      calls: [utility, formatter, persistence-adapter]
      uses: [types]
      default: deny

  persistence-adapter:
    description: "Every filesystem-touching helper lives here: stores, caches, scanners, graph I/O, atomic writes."
    enforce: strict
    when:
      any_of:
        - path: "source/cli/src/io/*-store.ts"
        - path: "source/cli/src/io/*-cache.ts"
        - path: "source/cli/src/io/artifact-reader.ts"
        - path: "source/cli/src/io/repo-scanner.ts"
        - path: "source/cli/src/io/find-index.ts"
        - path: "source/cli/src/io/file-content-cache.ts"
        - path: "source/cli/src/io/graph-fs.ts"
        - path: "source/cli/src/io/atomic-write.ts"
        - path: "source/cli/src/io/hash.ts"
        - path: "source/cli/src/io/paths.ts"
        - path: "source/cli/src/io/debug-log-writer.ts"
        - path: "source/cli/src/io/read-or-default.ts"
    aspects:
      - silent-missing-files
      - atomic-write-contract
      - posix-paths-source
      - no-direct-minimatch
      - read-or-default-via-helper
    log_required: true
    parents: [module]
    relations:
      calls: [persistence-adapter, utility]
      uses: [types]
      default: deny

  ast-adapter:
    description: "AST adapter — AST runtime, structural helpers, and report types for deterministic code analysis."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/ast/*.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - deterministic
      - posix-paths-source
      - no-direct-minimatch
    log_required: true
    parents: [module]
    relations:
      calls: [utility, llm-shared, ast-adapter, engine]
      uses: [types]
      default: deny

  structure-adapter:
    description: "Structure adapter — structure aspect runtime, ctx surface, allowed-reads guard."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/structure/*.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - deterministic
      - posix-paths-source
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [utility, ast-adapter, engine, persistence-adapter, structure-adapter]
      uses: [types]
      default: deny

  relations-adapter:
    description: "Relation-conformance subsystem — per-language dependency extractors, resolvers, and the pass/verify engine. Deterministic static code analysis."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/relations/**/*.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - deterministic
      - posix-paths-source
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [engine, ast-adapter, structure-adapter, persistence-adapter, llm-shared, utility, relations-adapter]
      uses: [types]
      default: deny

  llm-provider:
    description: "LLM provider — vendor-specific adapter implementing the provider interface. One file per vendor."
    enforce: strict
    when:
      path: "source/cli/src/llm/{anthropic,claude-code,codex,gemini-cli,google,ollama,openai}.ts"
    aspects:
      - provider-retry-contract
      - provider-redaction
      - posix-paths-source
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [llm-shared, llm-subprocess-base, utility]
      uses: [types]
      default: deny

  llm-shared:
    description: "LLM shared infrastructure — aspect verifier, model fetcher, provider factory, API utilities, types, index. Plumbing; no uniform semantic contract."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/llm/*.ts"
        - not:
            path: "source/cli/src/llm/{anthropic,claude-code,codex,gemini-cli,google,ollama,openai,cli-base}.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [llm-provider, utility]
      uses: [types]
      extends: [llm-shared]
      default: deny

  llm-subprocess-base:
    description: "Subprocess-based LLM provider substrate — spawns child processes for CLI-native LLMs (claude-code, codex, gemini-cli). Exempt from deterministic; redaction is what matters."
    enforce: strict
    when:
      path: "source/cli/src/llm/cli-base.ts"
    aspects:
      - provider-redaction
      - posix-paths-source
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [utility]
      uses: [types]
      default: deny

  formatter:
    description: "Output formatter — pure functions that assemble human/agent-readable CLI output strings. No I/O, no business logic."
    enforce: strict
    when:
      path: "source/cli/src/formatters/*.ts"
    aspects:
      - what-why-next
      - posix-paths-source
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [utility]
      uses: [types]
      default: deny

  types:
    description: "Type definitions — pure TypeScript type/interface/enum declarations. No runtime behavior, no executable statements."
    enforce: strict
    when:
      path: "source/cli/src/model/*.ts"
    aspects:
      - no-direct-minimatch
    parents: [module]
    relations:
      uses: [types]
      default: deny

  utility:
    description: "Pure helper utilities — no I/O, no side effects on import, no direct filesystem access (fs-touching helpers live in persistence-adapter)."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/utils/*.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - no-side-effects-on-import
      - no-direct-fs
      - posix-paths-source
      - no-direct-minimatch
    parents: [module]
    relations:
      calls: [utility]
      uses: [types]
      default: deny

  template:
    description: "Content template — generates agent-facing rules content and platform installation files."
    enforce: strict
    when:
      path: "source/cli/src/templates/{default-config,platform,rules}.ts"
    aspects:
      - what-why-next
      - posix-paths-source
      - no-direct-minimatch
    log_required: true
    parents: [module]
    relations:
      calls: [utility, template]
      uses: [types]
      default: deny

  knowledge-doc:
    description: "Knowledge document — TypeScript module exporting a markdown string for yg knowledge read."
    enforce: strict
    when:
      path: "source/cli/src/templates/knowledge/*.ts"
    aspects:
      - no-direct-minimatch
    parents: [module]
    relations:
      uses: [knowledge-doc]
      default: deny

  schema-doc:
    description: "Schema reference document — TypeScript module exporting a YAML schema string for yg schemas read."
    enforce: strict
    when:
      path: "source/cli/src/templates/schemas/*.ts"
    aspects:
      - no-direct-minimatch
    parents: [module]
    relations:
      default: deny

  test-suite:
    description: "Test suite — integration and unit tests guarding system invariants. Centralized under source/cli/tests/ (plural). Includes test files (.ts) and generated artifacts such as snapshot files."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/tests/**"
        - not:
            path: "source/cli/tests/fixtures/**"
    aspects:
      - test-deterministic
    parents: [module, test-suite]

  doc-page:
    description: "Documentation page — user-facing markdown under docs/ for Yggdrasil adopters."
    enforce: strict
    when:
      path: "docs/**/*.md"
    parents: [module]
    relations:
      default: deny

  build-script:
    description: "Build/repo script — shell, JS, or TS scripts for CI and local development tasks under scripts/."
    enforce: strict
    when:
      any_of:
        - path: "scripts/*.sh"
        - path: "scripts/*.mjs"
        - path: "scripts/*.ts"
    parents: [module]
    relations:
      default: deny

  example:
    description: "Example material — demo files for Yggdrasil adopters. Not enforced strict (examples may be incomplete by design)."
    when:
      path: "examples/**"
    parents: [module]
    relations:
      default: deny

  ci-config:
    description: "CI and tooling configuration — GitHub Actions workflows, TypeScript config, package manifests, test/build tooling config."
    enforce: strict
    when:
      any_of:
        - path: ".github/workflows/*.yml"
        - path: "source/cli/tsconfig*.json"
        - path: "source/cli/package.json"
        - path: "source/cli/package-lock.json"
        - path: ".markdownlint*"
        - path: "source/cli/eslint.config.*"
        - path: "source/cli/vitest*.config.ts"
        - path: "source/cli/tsup.config.ts"
        - path: "source/cli/playwright.config.ts"
    parents: [project, module]
    relations:
      default: deny

  repo-config:
    description: "Repository configuration and developer tooling — root-level dotfiles, dev tool config, docs site infrastructure, and CLI package configuration files."
    when:
      any_of:
        - path: ".claude/**"
        - path: ".cursor/**"
        - path: ".devcontainer/**"
        - path: ".editorconfig"
        - path: ".gitattributes"
        - path: ".gitignore"
        - path: ".github/**"
        - path: ".markdownlint*"
        - path: ".nvmrc"
        - path: ".rtk/**"
        - path: "*.code-workspace"
        - path: "AGENTS.md"
        - path: "CHANGELOG.md"
        - path: "CLAUDE.md"
        - path: "CODE_OF_CONDUCT.md"
        - path: "CONTRIBUTING.md"
        - path: "LICENSE"
        - path: "README.md"
        - path: "SECURITY.md"
        - path: "SUPPORT.md"
        - path: "docs/package.json"
        - path: "docs/package-lock.json"
        - path: "docs/public/**"
        - path: "docs/.vitepress/**"
        - path: "tools/**"
        - path: "source/cli/.npmignore"
        - path: "source/cli/.npmrc"
        - path: "source/cli/README.md"
        - path: "source/cli/.prettierrc"
        - path: "source/cli/.prettierignore"
        - path: "source/cli/eslint.config.js"
        - path: "source/cli/tsup.config.ts"
        - path: "source/cli/vitest.config.ts"
        - path: "source/cli/vitest.external.config.ts"
        - path: "source/cli/scripts/**"
        - path: "source/cli/src/**/.gitkeep"
        - path: "source/cli/tests/**/.gitkeep"
    parents: [project, module]
    relations:
      default: deny

  test-fixture:
    description: "Test fixture projects — self-contained mini-repos used as data for integration and E2E tests."
    when:
      path: "source/cli/tests/fixtures/**"
    parents: [module]
    relations:
      default: deny

  reference-catalogue:
    description: "Catalogue of structured reference docs under reference/<kind>/. Each kind declares its structure in reference/<kind>/_reference-schema.yaml; the generic deterministic aspects reference/doc-shape + reference/layout + reference/section-body enforce it. First kind: the relations name-resolution case catalogue (one .md per identification case, 1:1 with a runCase test)."
    enforce: strict
    when:
      path: "reference/**/*"
    aspects:
      - reference/doc-shape
      - reference/layout
      - reference/section-body
    log_required: false
    parents: [module, reference-catalogue]
    relations:
      uses: [test-suite]
      default: deny

  # ── Portal (Heartwood) backend types — the read-only web-portal extension ──
  # Pure extension over the CLI's existing read-only functions; no change to
  # verification logic. Recursive+strict whens force-classify any .ts placed under
  # source/cli/src/portal/ so a misplaced backend file cannot orphan into an
  # unenforced coverage warning.

  portal-contract:
    description: "The PortalData data-contract at source/cli/src/portal/contract.ts — the PortalData / PortalNode / ... interfaces plus the exported STATES const tuple, the single typed seam between the backend pipeline and the frontend. Pure type/const declarations; no runtime behavior, no cross-node imports."
    enforce: strict
    when:
      path: "source/cli/src/portal/contract.ts"
    aspects:
      - no-direct-minimatch
    parents: [module]
    relations:
      uses: [types]
      default: deny

  portal-pipeline:
    description: "Portal extraction-pipeline modules under source/cli/src/portal/ (extract.ts + derive-*.ts). They REUSE the CLI's read-only functions (loadGraphOrAbort, walkRepoFiles, runCheck, verifyLock, computeExpectedPairs) to derive PortalData — read-only orchestration that loads the graph committed-only (noSecrets), walks repo files, calls the engine's read-only entry points, and assembles the data contract. Forbidden: writing the lock, reading secrets, re-hashing/re-implementing a count. contract.ts is excluded (portal-contract); server/** is excluded; *.test.ts is excluded. Recursive+strict so ANY .ts under source/cli/src/portal/ is force-classified."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/portal/**/*.ts"
        - not:
            path: "source/cli/src/portal/contract.ts"
        - not:
            path: "source/cli/src/portal/engine-api.ts"
        - not:
            path: "source/cli/src/portal/api/**"
        - not:
            path: "source/cli/src/portal/server/**"
        - not:
            path: "**/*.test.ts"
    aspects:
      - portal/no-secrets-import
      - portal/loadgraph-nosecrets-flag
      - portal/no-lock-writer-import
      - portal/count-parity-via-reuse
      - portal/focused-file-size
      - portal/focused-file-exports
      - posix-paths-source
      - no-direct-minimatch
    log_required: true
    parents: [module]
    relations:
      calls: [portal-engine-api, persistence-adapter]
      uses: [types, portal-contract]
      default: deny

  portal-engine-api:
    description: "The portal's SINGLE read-only gateway to the engine — source/cli/src/portal/engine-api.ts (+ portal/api/**). It wraps EVERY engine call the portal needs (loadPortalGraph noSecrets, runPortalCheck, readAndVerifyLock, computePortalPairs, computePortalBoundary FULL phantom+declared-only+forbidden-type, scanPortalSuppressions, readNodeLog, and the effective-aspect/status helpers) behind a clean API, concentrating the portal→engine coupling into ONE node (the single seam) instead of a spider of relations. READ-ONLY by construction: it imports NO lock writer and loads the graph committed-only (noSecrets). The extraction pipeline reaches the engine ONLY through this facade. Recursive+strict so any .ts under portal/engine-api.ts or portal/api/ is force-classified here."
    enforce: strict
    when:
      all_of:
        - any_of:
            - path: "source/cli/src/portal/engine-api.ts"
            - path: "source/cli/src/portal/api/**/*.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - portal/no-secrets-import
      - portal/loadgraph-nosecrets-flag
      - portal/no-lock-writer-import
      - portal/count-parity-via-reuse
      - portal/focused-file-size
      - posix-paths-source
      - no-direct-minimatch
    log_required: true
    parents: [module]
    relations:
      calls: [engine, command-support, persistence-adapter, relations-adapter, ast-adapter, formatter, utility]
      uses: [types, portal-contract]
      default: deny

  portal-server:
    description: "The portal's loopback read-only HTTP server under source/cli/src/portal/server/**. It binds 127.0.0.1 ONLY (never 0.0.0.0 / never exposed), serves the live portal page at /, GET /data (a fresh, no-persist re-extraction of PortalData), GET /static/* (committed frontend assets), GET /approve/dry-run (the cost preview), and POST /approve (the ONE write action). Read-only by default. The single write — Approve — SPAWNS the existing CLI binary (yg check --approve, plus --only-deterministic when the LLM checkbox is off) as a child process; it NEVER re-implements fill, NEVER imports a lock writer, and NEVER reads secrets itself (the spawned CLI owns keys). View-only mode (--no-write) rejects POST /approve with 409. The server reaches the engine ONLY through the portal's own modules: it CALLS the pipeline (extractPortalData) and the serializer (page render + asset read), and USES the data contract — it declares NO direct relation to any engine subsystem. Recursive+strict so any .ts under portal/server/ is force-classified here; *.test.ts is excluded."
    enforce: strict
    when:
      all_of:
        - path: "source/cli/src/portal/server/**/*.ts"
        - not:
            path: "**/*.test.ts"
    aspects:
      - portal/loopback-only
      - portal/approve-shells-cli-only
      - portal/no-secrets-import
      - portal/no-lock-writer-import
      - portal/focused-file-size
      - posix-paths-source
      - no-direct-minimatch
    log_required: true
    parents: [module]
    relations:
      calls: [portal-pipeline, portal-engine-api]
      uses: [types, portal-contract]
      default: deny

  portal-frontend-core:
    description: "Portal frontend (browser) core — the shell.html, the CSS, and the non-view browser JS that parses the inlined PortalData and renders the page. Vanilla, framework-free, offline. Recursive+strict over the frontend asset root, EXCLUDING the vendored layout library (vendor/**, classified as portal-frontend-vendor) and the per-surface view modules (js/views/**, reserved for portal-frontend-view in a later phase). Default aspects forbid Node imports, network/CDN references, and secret strings, and keep each file focused. No relations: a browser file has no graph-level dependency on another node's code."
    enforce: strict
    when:
      all_of:
        - any_of:
            - path: "source/cli/src/templates/portal/*.html"
            - path: "source/cli/src/templates/portal/*.css"
            - path: "source/cli/src/templates/portal/*.js"
            - path: "source/cli/src/templates/portal/js/**/*.js"
        - not:
            path: "source/cli/src/templates/portal/vendor/**"
        - not:
            path: "source/cli/src/templates/portal/js/views/**"
    aspects:
      - portal/no-node-imports-in-frontend
      - portal/no-cdn-no-network
      - portal/no-secrets-strings
      - portal/focused-file-size
    parents: [module]
    relations:
      default: deny

  portal-frontend-view:
    description: "Portal frontend (browser) per-surface VIEW modules — one focused file per §3a surface under source/cli/src/templates/portal/js/views/. Each consumes the inlined PortalData and renders one surface (Overview, Coverage & Audit, the Node Attestation panel, the Structure tree, Relations & Boundaries) per its design mockup and the honest-state palette. The same envelope as the frontend core (no Node imports, no network/CDN references, no secret strings, focused file size) PLUS the honesty moat: every view must reference the shared honest-state model (never invent an ad-hoc green) and must never collapse distinct verdict states into one green. Recursive+strict over js/views/** so any view file is force-classified into this type. No relations: a browser file has no graph-level dependency on another node's code."
    enforce: strict
    when:
      path: "source/cli/src/templates/portal/js/views/**/*.js"
    aspects:
      - portal/honest-state-never-collapsed
      - portal/honest-state-anchor
      - portal/no-node-imports-in-frontend
      - portal/no-cdn-no-network
      - portal/no-secrets-strings
      - portal/focused-file-size
    parents: [module]
    relations:
      default: deny

  portal-frontend-vendor:
    description: "Portal frontend vendored third-party assets — the inlined layout library (d3-hierarchy), committed as a static asset under source/cli/src/templates/portal/vendor/. Taken as shipped (third-party code), so it is deliberately NOT subject to the focused-file-size cap; the no-network-egress aspect is the guard that keeps that exemption safe — vendored code may do layout math only and must never touch the network. Recursive+strict over vendor/**."
    enforce: strict
    when:
      path: "source/cli/src/templates/portal/vendor/**"
    aspects:
      - portal/no-network-egress
    parents: [module]
    relations:
      default: deny
