version: 5.1.0
quality:
  max_direct_relations: 20
parallel: 10
debug: false
reviewer:
  tiers:
    standard:
      # Canonical reviewer for this repo. The verdict hash folds only the tier
      # NAME, so you can point `standard` at your own reviewer locally via
      # .yggdrasil/yg-secrets.yaml (a deep-merge overlay over this file) without
      # invalidating any recorded baseline. (Was configured for sonnet.)
      provider: claude-code
      consensus: 1
      # Raised from 50000: this repo's canonical agent-rules template (rules.ts) is
      # ~46 KB, leaving almost no headroom under 50000. sonnet's 200K context handles
      # 60K comfortably, and max_prompt_chars is excluded from the verdict hash, so
      # raising it invalidates no recorded baseline.
      max_prompt_chars: 60000
      config:
        model: sonnet
