name: Relations Reference — C#
type: reference-catalogue
description: "C# name-resolution case catalogue — one .md per identification case
  (a syntactic form by which a cross-node C# dependency is detected and resolved,
  or deliberately silenced), 1:1 with a runCase('<id>') test in the C# matrix
  suite. The two relations aspects enforce that correspondence."
aspects:
  - reference/relations/case-has-test
  - reference/relations/case-is-tested
relations:
  - target: cli/tests/unit/relations/extractors-matrix-csharp
    type: uses
mapping:
  - reference/relations/csharp/*.md
