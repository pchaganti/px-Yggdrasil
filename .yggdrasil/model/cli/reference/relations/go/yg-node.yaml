name: Relations Reference — Go
type: reference-catalogue
description: "Go name-resolution case catalogue — one .md per identification case
  (a syntactic form by which a cross-node Go dependency is detected and resolved
  through the import-path resolver, or deliberately silenced), 1:1 with a
  runCase('<id>') test in the Go matrix suite. The two relations aspects enforce
  that correspondence."
aspects:
  - reference/relations/case-has-test
  - reference/relations/case-is-tested
relations:
  - target: cli/tests/unit/relations/extractors-matrix-go
    type: uses
mapping:
  - reference/relations/go/*.md
