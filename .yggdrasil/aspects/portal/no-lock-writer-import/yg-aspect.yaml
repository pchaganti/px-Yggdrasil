name: PortalNoLockWriterImport
description: >-
  Portal backend files may not import, call, OR reference any lock-writing symbol
  (writeLock / setEntry / persistEntry / runFill / saveLock / commitLock) by
  imported name, namespace alias, or member access, and may not import the
  persisting fill module (core/fill) wholesale. A member READ of a writer off a
  lock-store namespace alias is itself a violation — binding it to a local
  (const persist = store.writeLock) then calling the local is still an in-process
  write, so the read, not just the call, is caught. The lock-store module itself is
  NOT banned — readLock lives there — only its writer symbols are. The single
  write in the whole portal is the out-of-process shelled Approve; the
  non-persisting fillDetPair (core/fill-det) is allowed. AST-based.
status: enforced
