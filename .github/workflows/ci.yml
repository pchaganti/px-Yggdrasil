name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege default token: this workflow only reads the repo (checkout, build,
# test, coverage upload). No job needs write scope, so pin the GITHUB_TOKEN to read-only.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The package supports Node >= 22. Run the full gate on the floor (22) and
      # the current major (24) so a version-specific regression fails CI, not the
      # user. Verified locally: build + 2833 tests pass on both.
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
        working-directory: source/cli
      - run: npm ci
        working-directory: docs
      # The portal e2e gate inside repo-check.sh drives a REAL Chromium through
      # Playwright. Chromium is rebuildable, not committed, so CI must install it
      # before the gate runs — otherwise repo-check.sh's Chromium-present guard
      # fails closed (a missing browser must never be a silent green). This is the
      # exact command that guard prints.
      - run: npx playwright install --with-deps chromium
        working-directory: source/cli
      - run: scripts/repo-check.sh
      - uses: codecov/codecov-action@v7
        # Upload coverage from a single matrix leg to avoid duplicate reports.
        #
        # Codecov is ADVISORY here, by design (fail_ci_if_error: false). The
        # binding coverage gate is `scripts/repo-check.sh`, which fails the build
        # if any of lines/statements/functions/branches drops below 90% — that
        # ran in the step above and already gates this job. Codecov adds reporting
        # and PR trend annotations only; a flaky upload (network, token, rate
        # limit) must NOT fail CI over coverage that repo-check already enforced.
        # Do not flip this to `true` expecting it to enforce coverage — it would
        # only make CI fail on Codecov outages, not on real coverage regressions.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && matrix.node-version == 22
        with:
          files: source/cli/coverage/lcov.info
          fail_ci_if_error: false
