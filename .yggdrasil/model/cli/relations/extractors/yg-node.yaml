name: Relation Extractors
type: relations-adapter
description: Per-language dependency extractors and resolvers — one extractor
  per supported language (C/C++, C#, Go, Java, Kotlin, PHP, Python, Ruby, Rust,
  TypeScript) plus their resolve helpers, the shared C/C++ substrate, include
  resolution, the extractor registry, and shared extractor types.
mapping:
  - source/cli/src/relations/extractors/c-cpp-shared.ts
  - source/cli/src/relations/extractors/c.ts
  - source/cli/src/relations/extractors/cpp.ts
  - source/cli/src/relations/extractors/csharp.ts
  - source/cli/src/relations/extractors/go-resolve.ts
  - source/cli/src/relations/extractors/go.ts
  - source/cli/src/relations/extractors/include-resolve.ts
  - source/cli/src/relations/extractors/java-resolve.ts
  - source/cli/src/relations/extractors/java.ts
  - source/cli/src/relations/extractors/kotlin.ts
  - source/cli/src/relations/extractors/php-resolve.ts
  - source/cli/src/relations/extractors/php.ts
  - source/cli/src/relations/extractors/python-resolve.ts
  - source/cli/src/relations/extractors/python.ts
  - source/cli/src/relations/extractors/registry.ts
  - source/cli/src/relations/extractors/ruby-resolve.ts
  - source/cli/src/relations/extractors/ruby.ts
  - source/cli/src/relations/extractors/rust-resolve.ts
  - source/cli/src/relations/extractors/rust.ts
  - source/cli/src/relations/extractors/typescript-resolve.ts
  - source/cli/src/relations/extractors/typescript.ts
  - source/cli/src/relations/extractors/types.ts
relations:
  - target: cli/ast/report
    type: calls
