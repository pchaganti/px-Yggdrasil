name: Relations Reference Case Runner
type: test-suite
description: "The single canonical relations name-resolution test harness —
  runCase('<id>'), the body of every matrix it('<id>'). Loads a reference case
  .md (reference/relations/<language>/<id>.md), builds an in-memory project from
  its embedded ## Files, drives the REAL relation pass (extractor + symbol table +
  owner index + resolver) exactly as pass.ts does, and asserts the ## Expect
  outcome plus no-unexpected-edge. Isolated in its own node so the shared harness
  keeps a small, focused reviewer prompt."
aspects: []
relations:
  - target: cli/ast/runtime
    type: uses
  - target: cli/core/language-registry
    type: uses
  - target: cli/relations/core
    type: uses
  - target: cli/relations/extractors
    type: uses
mapping:
  - source/cli/tests/unit/relations/reference-case-runner.ts
