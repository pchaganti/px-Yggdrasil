    { target: cli/core/checks/architecture, type: calls },
    { target: cli/core/file-when-evaluator, type: calls },
    { target: cli/formatters, type: calls },
    { target: cli/io/file-content-cache, type: calls },
    { target: cli/io/stores, type: calls },
    { target: cli/utils, type: calls }
  ]
mapping:
  - source/cli/src/core/checks/mapping.ts
