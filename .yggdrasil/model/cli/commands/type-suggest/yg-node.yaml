name: TypeSuggestCommand
type: command
description: Suggests which node_type a file fits based on architecture `when` predicates. Returns matching types (✓), closest non-matching types ranked by satisfied-fraction, or edge-case messages for .yggdrasil/ paths and non-existent files.
aspects:
  - posix-paths
relations:
  - target: cli/core/loader
    type: calls
  - target: cli/core/type-classifier
    type: calls
  - target: cli/io/file-content-cache
    type: calls
  - target: cli/io/stores
    type: calls
mapping:
  - source/cli/src/cli/type-suggest.ts
