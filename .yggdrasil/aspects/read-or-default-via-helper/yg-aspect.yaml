name: ReadOrDefaultViaHelper
description: "IO text-file reads with ENOENT-swallow must go through readFileOrDefault() from io/read-or-default. Inline try/catch around readFile that swallows ENOENT is forbidden; non-readFile error handling (lstat, readdir, dir-traversal) is allowed."
reviewer: ast
when:
  any_of:
    - node:
        type: persistence-adapter
    - node:
        type: parser-adapter
