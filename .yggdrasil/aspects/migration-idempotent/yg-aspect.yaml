name: MigrationIdempotent
description: "Migration code must be safe to run twice without corrupting state — all write operations are idempotent and the migration checks the current version before acting."
reviewer:
  type: llm
references:
  - path: source/cli/src/core/migrator.ts
    description: "Canonical migration helpers: detectVersion (state inspection), updateConfigVersion (version bookkeeping), MigrationResult shape (actions/warnings/bumpVersion). Migrations satisfy this aspect by using these helpers in the documented pattern."
