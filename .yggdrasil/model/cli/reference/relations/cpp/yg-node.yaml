name: Relations Reference — C and C++
type: reference-catalogue
description: "C / C++ name-resolution case catalogue — one .md per identification case
  (a syntactic form by which a cross-node C or C++ dependency is detected and resolved
  through the canonical quoted-include join, or deliberately silenced), 1:1 with a
  runCase('<id>') test in the combined C/C++ matrix suite. C and C++ share one include
  mechanism end to end, so a single catalogue covers both (the schema forbids a combined
  directory, so every case lives under cpp/ with language: cpp; C-grammar behaviour is
  exercised through embedded .c/.h fixture files). The two relations aspects enforce that
  correspondence."
aspects:
  - reference/relations/case-has-test
  - reference/relations/case-is-tested
relations:
  - target: cli/tests/unit/relations/extractors-matrix-c-cpp
    type: uses
mapping:
  - reference/relations/cpp/*.md
