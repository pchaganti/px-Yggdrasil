name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Tag Release']
    types: [completed]
    branches: [main]

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' source/cli/package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          # dist-tag: a prerelease (X.Y.Z-<id>.N) publishes under its <id>
          # (alpha/beta/rc); a stable X.Y.Z publishes under 'latest'.
          if [[ "${VERSION}" == *-* ]]; then
            PRE="${VERSION#*-}"
            echo "disttag=${PRE%%.*}" >> $GITHUB_OUTPUT
          else
            echo "disttag=latest" >> $GITHUB_OUTPUT
          fi
      - name: Check npm for existing version
        id: npm-check
        run: |
          if npm view "@chrisdudek/yg@${{ steps.version.outputs.version }}" version > /dev/null 2>&1; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "::notice::Version ${{ steps.version.outputs.version }} already published on npm. Skipping publish + GitHub release."
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v6
        if: steps.npm-check.outputs.published == 'false'
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Use OIDC-capable npm
        if: steps.npm-check.outputs.published == 'false'
        run: npm install -g npm@latest
      - run: npm ci
        if: steps.npm-check.outputs.published == 'false'
        working-directory: source/cli
      - run: npm run build
        if: steps.npm-check.outputs.published == 'false'
        working-directory: source/cli
      # No NODE_AUTH_TOKEN: authentication is via OIDC trusted publishing
      # (permissions.id-token: write above). Provenance is generated automatically.
      - run: npm publish --provenance --access public --tag ${{ steps.version.outputs.disttag }}
        if: steps.npm-check.outputs.published == 'false'
        working-directory: source/cli
      - uses: softprops/action-gh-release@v3
        if: steps.npm-check.outputs.published == 'false'
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          # Flag prerelease versions (X.Y.Z-<id>) so they don't show as Latest.
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
