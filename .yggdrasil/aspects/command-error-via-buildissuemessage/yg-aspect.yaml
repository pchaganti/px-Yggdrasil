name: CommandErrorViaBuildIssueMessage
description: "CLI command handlers must construct user-visible error messages via buildIssueMessage, or route them through the loadGraphOrAbort / abortOnUnexpectedError helpers. Raw stderr.write of 'Error: ...' strings (constant text, .message concatenation) is forbidden in command files."
reviewer: ast
language: [typescript]
when:
  node:
    type: command
