name: Language Registry
description: The single source of truth mapping a source-file extension to its tree-sitter grammar (the wasm filename and npm package) and to the AST comment node-type names and delimiters that comment-based deterministic rules and the yg-suppress scanner depend on. Covers TypeScript/TSX/JavaScript, Python, Go, Rust, Java, C#, C, C++, PHP, Ruby, and JSON. Pure data plus extension-lookup helpers — no I/O, no imports.
type: engine
mapping:
  - source/cli/src/core/graph/language-registry.ts
