name: PortalEngineApi
type: portal-engine-api
description: >-
  The portal's SINGLE read-only gateway to the engine. engine-api.ts wraps every engine
  call the portal needs — loadPortalGraph (committed-only, noSecrets), runPortalCheck,
  readAndVerifyLock, computePortalPairs, scanPortalUncovered, readNodeLog, the
  effective-aspect/status helpers, the FULL live boundary (api/boundary.ts: phantom +
  declared-only + forbidden-type, joined from the relation pass and the architecture
  matrix), and the live suppression inventory (api/suppress-scan.ts: the relocated
  yg-suppress scan). This ONE node concentrates the entire portal→engine coupling (the
  single seam) so the extraction pipeline never reaches an engine subsystem directly — it
  imports only this facade and the data contract. Read-only by construction: no lock
  writer is imported and the graph is loaded committed-only. The boundary join changes no
  engine logic; it reuses an additive read-only detected-edge accessor on the relation
  pass.
