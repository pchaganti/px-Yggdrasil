# yg-config.yaml — Schema for the Yggdrasil project configuration
# Located at .yggdrasil/yg-config.yaml — one per project.
# Edit this after running yg init to describe your project.

version: "5.0.0"                  # managed by CLI — do not edit manually. Tracks the CLI version
                                  # that last initialized or upgraded this config.

quality:                          # optional — quality thresholds
  max_direct_relations: 10        #   maximum outgoing relations per node (warning if above)
  max_node_chars: 40000           #   per-node character budget — mapped source + aspect reference files (error if above)

parallel: 1                       # optional — concurrency limit for batch approve (positive integer, default: 1)

debug: false                      # optional — when true, appends all command output to .yggdrasil/.debug.log
                                  # Default: false (off). Log is append-only; rotate or delete manually.

reviewer:                         # required — aspect verification configuration
  default: standard               # tier name from `tiers:` below.
                                  # Required when tiers has >1 entry; optional with 1 tier.

  tiers:                          # required — at least one entry
    standard:                     # tier name (regex ^[a-zA-Z][a-zA-Z0-9_-]{0,62}$, not 'default')
      provider: claude-code       # provider id from KNOWN_PROVIDERS
      consensus: 1                # positive odd integer; consensus=1 means single call
      config:                     # provider-specific config (fixed key, not the provider name)
        model: sonnet             # model id, provider-specific
        # endpoint: ""            # optional override
        # temperature: 0          # default 0
        # max_tokens: auto        # 'auto' resolves via provider.getContextWindowSize()
        # timeout: 60             # optional, CLI providers
        # context_length_field: "" # optional, provider-specific
    deep:                         # second tier example
      provider: claude-code
      consensus: 3                # multi-vote for critical aspects
      config:
        model: opus
