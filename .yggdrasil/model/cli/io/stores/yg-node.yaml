name: IO Stores
type: persistence-adapter
description: Filesystem readers and writers for runtime state — find index,
  artifact reading, repository scanning, and low-level fs utilities
  (verdict-lock persistence lives in the cli/io/lock-store sibling node)
relations:
  - target: cli/model/graph
    type: uses
  - target: cli/io/atomic-write
    type: calls
    consumes:
      - write-atomic
  - target: cli/utils
    type: calls
mapping:
  - source/cli/src/io/artifact-reader.ts
  - source/cli/src/io/debug-log-writer.ts
  - source/cli/src/io/find-index.ts
  - source/cli/src/io/graph-fs.ts
  - source/cli/src/io/hash.ts
  - source/cli/src/io/log-store.ts
  - source/cli/src/io/paths.ts
  - source/cli/src/io/read-or-default.ts
  - source/cli/src/io/repo-scanner.ts
