name: Check
type: engine
description: "Unified check orchestrator — runs validation, coverage, the
  prompt-size gate, and lock verification (read-only: every expected pair's
  stored verdict is re-hashed against current inputs and rendered as pass,
  cached refusal, or unverified), then log integrity, and computes the suggested
  next command. Write-free: the lock is produced only by the fill stage behind
  yg check --approve."
aspects:
  - posix-paths-output
  - what-why-next
relations:
  - target: cli/core/validator
    type: calls
  - target: cli/core/context
    type: calls
  - target: cli/core/verify-lock
    type: calls
  - target: cli/io/lock-store
    type: calls
  - target: cli/model/graph
    type: uses
  - target: cli/model/lock
    type: uses
  - target: cli/model/validation
    type: uses
  - target: cli/core/check-codes
    type: calls
  - target: cli/core/check-coverage-tiers
    type: calls
  - target: cli/core/log-validator
    type: calls
  - target: cli/formatters
    type: calls
  - target: cli/io/parsers/config
    type: calls
  - target: cli/io/stores
    type: calls
  - target: cli/relations/core
    type: calls
  - target: cli/relations/extractors
    type: calls
  - target: cli/utils
    type: calls
mapping:
  - source/cli/src/core/check.ts
