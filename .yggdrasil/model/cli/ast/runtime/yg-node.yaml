name: AST Runtime
type: ast-adapter
description: AST runtime — loader hook for .cjs interop, parser setup, check
  runner, and yg-suppress marker extraction.
mapping:
  - source/cli/src/ast/loader-hook-impl.ts
  - source/cli/src/ast/loader-hook.ts
  - source/cli/src/ast/parse-cache.ts
  - source/cli/src/ast/parser.ts
  - source/cli/src/ast/runner.ts
  - source/cli/src/ast/suppress.ts
relations:
  - target: cli/ast/report
    type: calls
  - target: cli/core/language-registry
    type: calls
  - target: cli/utils
    type: calls
