name: AST Helpers — Syntactic
type: ast-adapter
description: Syntactic AST helpers — call-site extraction, decorator/export/import/modifier queries, walk traversal. Used by check.mjs writers.
mapping:
  - source/cli/src/ast/call.ts
  - source/cli/src/ast/decorators.ts
  - source/cli/src/ast/exports.ts
  - source/cli/src/ast/imports.ts
  - source/cli/src/ast/modifiers.ts
  - source/cli/src/ast/walk.ts
