name: PortalFocusedFileExports
description: >-
  Single-responsibility heuristic for portal backend files: a focused pipeline
  file exports a small set of runtime symbols (functions / classes / consts).
  A file that exports many runtime symbols is usually doing several jobs and
  should be split into derivation children. Counted per runtime BINDING, not per
  export statement: each declarator in `export const a=1,b=2` counts, and each
  non-type specifier in a named clause `export { a, b, c }` counts. Type-only
  exports (interface / type, `export type { … }`, and an inline `export { type T }`
  specifier) are cheap and not counted. Advisory — it surfaces a signal without
  blocking, to be calibrated and promoted once the boundary is settled.
status: advisory
