name: File When Evaluator
type: engine
description: Recursive evaluator for FileWhenPredicate against a (file, FileContentCache) pair. Returns boolean result and PredicateTrace for diagnostic rendering. Auto-exempts .yggdrasil/ paths. Propagates unreadable flag from cache so callers can emit file-unreadable instead of type-when-mismatch. Includes a head-limited safeRegexTest wrapper to avoid catastrophic backtracking.
