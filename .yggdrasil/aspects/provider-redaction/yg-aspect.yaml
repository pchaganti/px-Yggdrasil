name: ProviderRedaction
description: "LLM provider files must not reference raw prompt, response, content, or body identifiers in log calls (debugWrite, stderr.write) without redactSecrets() wrapping — prevents accidental exposure of LLM inputs or outputs in debug logs."
reviewer:
  type: ast
language: [typescript]
when:
  any_of:
    - node:
        type: llm-provider
    - node:
        type: llm-subprocess-base
