name: Structure
type: structure-adapter
description: "Structure-aspect runtime — context layer (types, ctx factories for
  fs, graph, parsers, the allowed-reads collector) and execution layer
  (orchestrates check.mjs loading, ctx construction, and result collection
  including result-bearing observations)."
mapping:
  - source/cli/src/structure/index.ts
  - source/cli/src/structure/expand-mapping-sync.ts
  - source/cli/src/structure/allowed-reads.ts
  - source/cli/src/structure/types.ts
  - source/cli/src/structure/ctx-fs.ts
  - source/cli/src/structure/ctx-graph.ts
  - source/cli/src/structure/ctx-parsers.ts
  - source/cli/src/structure/runner.ts
  - source/cli/src/structure/observations.ts
relations:
  - target: cli/ast/report
    type: calls
  - target: cli/ast/runtime
    type: calls
  - target: cli/core/language-registry
    type: calls
  - target: cli/core/pair-hash
    type: calls
  - target: cli/io/stores
    type: calls
  - target: cli/utils
    type: calls
