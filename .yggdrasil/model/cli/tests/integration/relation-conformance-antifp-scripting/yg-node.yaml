name: Integration Tests — Relation Conformance Anti-False-Positive (Scripting)
type: test-suite
description: "Anti-false-positive integration suites for the dynamic/scripting
  languages — PHP, Python, Ruby, Rust. Each asserts that dynamic, reflective,
  external, or unmapped-target dependencies produce NO
  relation-undeclared-dependency, guarding the check's zero-false-positive
  contract."
aspects: []
relations:
  [
    { target: cli/core/loader, type: uses },
    { target: cli/relations, type: uses },
    { target: cli/relations/extractors, type: uses }
  ]
mapping:
  - source/cli/tests/integration/relation-php-antifp.test.ts
  - source/cli/tests/integration/relation-python-antifp.test.ts
  - source/cli/tests/integration/relation-ruby-antifp.test.ts
  - source/cli/tests/integration/relation-rust-antifp.test.ts
