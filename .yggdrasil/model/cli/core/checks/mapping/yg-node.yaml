  gitignored mappings, duplicate mappings, strict backward coverage, mapping
  ownership overlap, mapping paths existing on disk, oversized/wide nodes, and
  directories missing yg-node.yaml."
aspects:
  - posix-paths-output
  - what-why-next
relations:
