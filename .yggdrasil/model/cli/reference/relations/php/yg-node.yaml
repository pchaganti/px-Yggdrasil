name: Relations Reference — PHP
type: reference-catalogue
description: "PHP name-resolution case catalogue — one .md per identification case
  (a syntactic form by which a cross-node PHP dependency is detected and resolved,
  or deliberately silenced), 1:1 with a runCase('<id>') test in the PHP matrix
  suite. The two relations aspects enforce that correspondence."
aspects:
  - reference/relations/case-has-test
  - reference/relations/case-is-tested
relations:
  - target: cli/tests/unit/relations/extractors-matrix-php
    type: uses
mapping:
  - reference/relations/php/*.md
