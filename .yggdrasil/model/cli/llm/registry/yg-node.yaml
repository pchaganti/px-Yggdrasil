name: LLM Registry
type: llm-shared
description: Provider registry barrel — side-effect-imports every concrete LLM
  provider to trigger self-registration, then re-exports the provider factory
  and shared types. Isolated from the rest of the shared layer so the
  registration fan-out (registry depends on every provider, every provider
  depends on shared) does not close a cycle through the shared interface.
relations:
  - target: cli/llm/providers
    type: calls
  - target: cli/llm/shared
    type: extends
mapping:
  - source/cli/src/llm/index.ts
