aspects:
  - posix-paths-output
relations:
  - target: cli/core/migrator
    type: calls
  - target: cli/io/lock-store
    type: calls
  - target: cli/model/lock
    type: uses
  - target: cli/utils
    type: calls
mapping:
  - source/cli/src/migrations/index.ts
  - source/cli/src/migrations/to-5.1.0.ts
  - source/cli/src/migrations/split-lock.ts
