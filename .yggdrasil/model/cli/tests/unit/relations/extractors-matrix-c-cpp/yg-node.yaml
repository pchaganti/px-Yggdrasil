name: Relations Name-Resolution Matrix — C and C++
type: test-suite
description: "Exhaustive name-resolution identification matrix for the C and C++
  relation-conformance extractors — every supported #include/reference form that
  must resolve to a cross-node edge via the canonical relative join, and every
  shape that must stay silent (zero false positives). Catalogue-driven: every
  it('<id>') is a runCase('<id>') over a reference case in reference/relations/cpp/
  (one combined catalogue for both C and C++, which share the include mechanism),
  mirroring the Go/Rust/PHP matrices. Isolated in its own node because the matrix is
  large enough to exceed the reviewer prompt limit if combined with other languages."
aspects: []
