# _reference-schema.yaml — structure contract for the `relations` reference kind.
#
# This is the per-kind descriptor consumed by the GENERIC deterministic aspects
# (reference-doc-shape, reference-layout). It declares the directory layout, the
# required+enumerated frontmatter, and the required `##` section headings for
# every `<id>.md` of this kind. The generic aspects know nothing about relations;
# they are parameterised entirely by this file.
#
# Kind: relations name-resolution case catalogue. Each `.md` is ONE identification
# case (a syntactic form by which a cross-node code dependency is detected and
# resolved, or deliberately silenced), 1:1 with a `runCase('<id>')` test.

kind: relations

# ── Directory layout ─────────────────────────────────────────────────────────
# `pattern` is a path template under the kind root (reference/relations/). Each
# `<segment>` token is one path segment whose literal value must be a member of
# the matching `segments.<segment>` enum. `<id>` is the filename stem (unique
# within the kind). `allow_only` lists the basename globs that may exist anywhere
# under the kind root — anything else is a stray-file violation.
layout:
  pattern: "<language>/<id>.md"
  segments:
    language: [csharp, php, kotlin, java, typescript, python, go, rust, c, cpp, ruby]
  allow_only: ["*.md", "_reference-schema.yaml"]

# ── Frontmatter contract ─────────────────────────────────────────────────────
# Every `.md` opens with a YAML frontmatter block (`---` … `---`). `required`
# fields must all be present; `enums` constrain a field's value to an allowed set.
# `id` is implicitly required and must equal the filename stem (checked by the
# aspect, not listed here). `language` must equal the `<language>` path segment.
frontmatter:
  required: [id, language, category, expectation, cites]
  enums:
    category: [import, usage-site, nested, trap, dynamic, builtin]
    # expectation = the spec-correct outcome the runCase test asserts:
    #   edge    — the code HAS a real cross-node dependency; the check must detect
    #             it and point at the right node (recall).
    #   silence — the check must emit NO edge (genuinely no dependency, or pointing
    #             anywhere would be a false positive) (zero-FP).
    expectation: [edge, silence]

# ── Required sections ────────────────────────────────────────────────────────
# The `##` headings every `.md` must contain, in this exact order. Additional
# `##` sections may follow the required ones (e.g. a trailing `## Why`).
#   Rule   — the name-resolution rule the case exercises (prose + spec cite).
#   Files  — one or more ```<lang> path=<repo-rel>``` fenced blocks: the embedded
#            fixture code the test loads verbatim (single source, no drift).
#   Expect — the asserted outcome: `file:line -> node:<id>` edge lines, and/or a
#            bare `silence` line meaning no cross-node edge may be emitted.
sections:
  required: [Rule, Files, Expect]
