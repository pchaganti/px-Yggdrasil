name: Relations Name-Resolution Matrix — PHP
type: test-suite
description: "Exhaustive name-resolution identification matrix for the PHP
  relation-conformance extractor — every supported use-import and inline
  leading-backslash class-reference form that must resolve to a cross-node edge,
  the per-clause function/const guard in grouped use imports, and every shape that
  must stay silent (namespace-relative inline, function/const FQN, dynamic forms).
  Catalogue-driven: every it('<id>') is a runCase('<id>') over a reference case in
  reference/relations/php/, mirroring the Kotlin/Java matrices. Split from the
  former TS+PHP bundle so each language's matrix stays within the reviewer prompt
  limit."
aspects: []
relations:
  - target: cli/tests/unit/relations/reference-runner
    type: uses
mapping:
  - source/cli/tests/unit/relations/extractors/php-name-resolution-matrix.test.ts
